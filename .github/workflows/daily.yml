name: 🏙️ 迪拜今日报 · 每日自动生成

on:
  schedule:
    # 早安版：迪拜时间 06:00 = UTC 02:00
    - cron: '0 2 * * *'
    # 夜读版：迪拜时间 21:00 = UTC 17:00
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      edition:
        description: '生成版本 (morning / evening / both)'
        required: false
        default: 'both'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📰 Generate News
        run: |
          # Determine which edition based on trigger time
          HOUR=$(date -u +%H)
          INPUT="${{ github.event.inputs.edition }}"

          if [ "$INPUT" = "morning" ]; then
            EDITION="morning"
          elif [ "$INPUT" = "evening" ]; then
            EDITION="evening"
          elif [ "$INPUT" = "both" ] || [ -n "$INPUT" ]; then
            EDITION="both"
          elif [ "$HOUR" = "02" ]; then
            EDITION="morning"
          elif [ "$HOUR" = "17" ]; then
            EDITION="evening"
          else
            EDITION="both"
          fi

          echo "🕐 UTC Hour: $HOUR | Generating: $EDITION"

          if [ "$EDITION" = "both" ]; then
            node generate.js morning
            node generate.js evening
          else
            node generate.js $EDITION
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 📤 Commit & Push
        run: |
          git config user.name "迪拜今日报 Bot"
          git config user.email "dubai-daily-bot@github.com"
          git add data/morning.json data/evening.json
          git diff --staged --quiet || git commit -m "📰 自动更新 $(TZ='Asia/Dubai' date '+%Y-%m-%d %H:%M') 迪拜时间"
          git push
