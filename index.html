<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迪拜今日报 · Dubai Daily Digest (V4.3 晚报深度版)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#c9a84c;--gl:#f0d080;--gd:#7a5a20;--bg:#08080d;--b1:#2a2010;--b2:#1e1a0a;--tx:#d8c8a8;--td:#8a7a58;--tm:#4a3e28}
  body{background:var(--bg);color:var(--tx);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}

  .mast{width:100%;max-width:500px;text-align:center;margin-bottom:20px}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:9px 0}
  .rule2{height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent);margin:9px 0}
  .msub{font-size:9px;letter-spacing:8px;color:var(--tm);margin-bottom:4px}
  .mcn{font-size:30px;font-weight:700;background:linear-gradient(135deg,#c9a84c,#f0d080,#a07030);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px;line-height:1;margin-bottom:5px}
  .men{font-size:8px;letter-spacing:6px;color:var(--tm)}
  .mode-badge{display:inline-block;padding:4px 12px;background:linear-gradient(135deg,#4a8a5a,#2a6a3a);border-radius:12px;font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:10px}

  .btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .gbtn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#c9a84c,#a07830);border:none;color:#08080d;padding:11px 24px;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:opacity .2s;border-radius:1px}
  .gbtn:disabled{opacity:.35;cursor:not-allowed}
  .sbtn{display:none;align-items:center;gap:6px;background:#1a1a0a;border:1px solid var(--gold);color:var(--gold);padding:11px 18px;font-family:'Noto Serif SC',serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:1px;transition:all .2s}
  .sbtn:hover{background:rgba(201,168,76,.15)}
  .tbtn{display:none;align-items:center;gap:6px;background:#0a1a2a;border:1px solid #2a6aaa;color:#7aaadd;padding:11px 18px;font-family:'Noto Serif SC',serif;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:1px}
  .tbtn:hover{background:rgba(42,106,170,.2)}
  .setbtn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--b1);color:var(--tm);padding:9px 14px;font-size:11px;cursor:pointer;border-radius:1px;letter-spacing:1px}
  .dbgbtn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid #4a4a2a;color:#8a8a5a;padding:9px 14px;font-size:11px;cursor:pointer;border-radius:1px;letter-spacing:1px}

  .prog{margin-top:10px;font-size:11px;color:var(--gold);letter-spacing:1px;min-height:15px;animation:pulse 1.5s ease-in-out infinite}
  .err{margin-top:8px;font-size:10px;color:#cc4444;max-width:460px;line-height:1.6;word-break:break-all}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#0f0f0a;border:1px solid var(--b1);padding:24px;width:100%;max-width:420px;position:relative;max-height:80vh;overflow-y:auto}
  .modal-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:16px}
  .modal label{display:block;font-size:10px;color:var(--td);letter-spacing:1px;margin-bottom:5px;margin-top:12px}
  .modal input{width:100%;background:#08080d;border:1px solid var(--b1);color:var(--tx);padding:9px 10px;font-size:11px;font-family:'Noto Serif SC',serif;outline:none;border-radius:1px}
  .modal input:focus{border-color:var(--gold)}
  .modal-hint{font-size:9px;color:var(--tm);margin-top:5px;line-height:1.6}
  .modal-btns{display:flex;gap:8px;margin-top:18px}
  .modal-save{flex:1;background:linear-gradient(135deg,#c9a84c,#a07830);border:none;color:#08080d;padding:10px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:2px}
  .modal-cancel{background:transparent;border:1px solid var(--b1);color:var(--tm);padding:10px 16px;cursor:pointer;font-size:11px;font-family:'Noto Serif SC',serif}
  .close-x{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--tm);font-size:18px;cursor:pointer}

  .debug-log{background:#0a0a08;border:1px solid #2a2a1a;padding:12px;font-size:9px;color:#8a8a6a;font-family:monospace;max-height:200px;overflow-y:auto;margin-top:10px;line-height:1.4;display:none}
  .debug-log.show{display:block}

  /* CARD STYLES */
  .card-container{width:100%;max-width:500px;margin-top:16px;display:flex;flex-direction:column;gap:20px}
  .card{width:100%;background:linear-gradient(160deg,#141108 0%,#0d0d08 50%,#111008 100%);border:1px solid var(--b1);box-shadow:0 0 60px rgba(201,168,76,.08),0 20px 60px rgba(0,0,0,.9);animation:fadeIn .5s ease;position:relative;overflow:hidden}
  .tbar{height:3px;background:linear-gradient(90deg,transparent 5%,var(--gold) 30%,var(--gl) 50%,var(--gold) 70%,transparent 95%)}
  .bbar{height:2px;background:linear-gradient(90deg,transparent 10%,var(--gd) 40%,var(--gold) 50%,var(--gd) 60%,transparent 90%)}
  .chdr{padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--b2)}
  .hl .cn{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:3px}
  .hl .en{font-size:7px;letter-spacing:4px;color:var(--tm);margin-top:3px}
  .hr .dt{font-size:17px;font-weight:700;color:var(--gold);text-align:right}
  .hr .yr{font-size:8px;letter-spacing:2px;color:var(--tm);margin-top:3px;text-align:right}
  .sbar{padding:5px 20px;background:rgba(201,168,76,.03);border-bottom:1px solid var(--b2);font-size:8px;color:var(--tm);display:flex;align-items:center;gap:5px}
  .sdot{width:4px;height:4px;border-radius:50%;background:#4a8a5a;flex-shrink:0;animation:blink 2s infinite}
  
  .sec{padding:12px 20px 8px}
  .slbl{display:flex;align-items:center;gap:7px;margin-bottom:10px}
  .scn{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .sen{font-size:7px;letter-spacing:4px;color:var(--tm)}
  .sln{flex:1;height:1px;background:var(--b2)}
  
  .ni{display:flex;gap:10px;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,.015);border-left:2px solid var(--b1)}
  .ne{font-size:15px;line-height:1.5;flex-shrink:0}
  .nb{flex:1;min-width:0}
  .nt{font-size:13px;font-weight:700;color:#d4c4a0;line-height:1.4;margin-bottom:3px}
  .ns{font-size:11px;color:var(--td);line-height:1.6}
  
  .rw{margin:0 20px 12px;padding:12px 15px;background:rgba(201,168,76,.04);border:1px solid var(--b1);position:relative}
  .rl{position:absolute;top:-8px;left:10px;background:#0d0d08;padding:0 8px;font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .rt{font-size:12px;line-height:1.8;color:#c4b490;font-style:italic;padding-top:2px}
  
  .mi{margin-bottom:8px;padding:8px 12px;background:linear-gradient(90deg,rgba(201,168,76,.07),transparent 80%);border-left:2px solid var(--gd);font-size:11px;color:#b09a6a;line-height:1.7}
  .mi strong{color:var(--gold);font-size:12px;display:block;margin-bottom:4px}
  
  .cft{border-top:1px solid var(--b2);padding:8px 20px;display:flex;justify-content:space-between}
  .ft{font-size:8px;letter-spacing:2px;color:var(--tm)}

  .share-status{margin-top:10px;font-size:11px;color:#4aaa7a;letter-spacing:1px;min-height:16px;text-align:center}
  .empty{width:100%;max-width:500px;text-align:center;padding:44px 20px;border:1px dashed var(--b1);margin-top:16px;color:var(--tm)}
  .ei{font-size:36px;margin-bottom:12px}
  .et{font-size:12px;letter-spacing:2px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-x" onclick="closeSettings()">✕</button>
    <div class="modal-title">⚙️ 配置 Telegram 推送</div>
    
    <label>Telegram Bot Token</label>
    <input type="password" id="tgToken" placeholder="从 @BotFather 获取">
    <div class="modal-hint">格式: 123456:ABCDefGHIjklmnoPQRstUVwxyz</div>
    
    <label>Telegram Chat ID</label>
    <input type="text" id="tgChatId" placeholder="您的频道或个人 ID">
    <div class="modal-hint">频道 ID 需以 -100 开头，如: -100123456789</div>
    
    <div class="modal-btns">
      <button class="modal-save" onclick="saveSettings()">保存配置</button>
      <button class="modal-cancel" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="mast">
  <div class="msub">Dubai · 迪拜 · دبي · UAE</div>
  <div class="mcn">迪拜今日报</div>
  <div class="men">LOCAL LIFE · REAL NEWS · DAILY UPDATES · AI CURATED</div>
  <div class="rule"></div>
  <div class="mode-badge" id="modeBadge">🌅 早间版</div>
  <div class="rule2"></div>
</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="gbtn" id="btn" onclick="generate()">📰 生成今日报</button>
  <button class="sbtn" id="saveBtn" onclick="saveAllImages()">💾 保存图片</button>
  <button class="tbtn" id="tgBtn" onclick="sendAllToTelegram()">📤 发送到 Telegram</button>
  <button class="setbtn" onclick="openSettings()">⚙️ 设置</button>
  <button class="dbgbtn" onclick="toggleDebug()">🐛 调试</button>
</div>

<div class="prog" id="prog"></div>
<div class="err" id="err" style="display:none"></div>
<div class="debug-log" id="debugLog"></div>
<div class="share-status" id="shareStatus"></div>

<!-- CARDS CONTAINER -->
<div class="card-container" id="cardContainer"></div>
<div class="empty" id="empty" style="display:none"><div class="ei">📭</div><div class="et">点击「生成今日报」开始</div></div>

<script>
let generatedData = null;
let debugMode = false;

function log(msg) {
  const debugLog = document.getElementById('debugLog');
  if(debugMode) {
    debugLog.innerHTML += msg + '<br>';
    debugLog.scrollTop = debugLog.scrollHeight;
  }
  console.log(msg);
}

function toggleDebug() {
  debugMode = !debugMode;
  document.getElementById('debugLog').classList.toggle('show');
}

function K() { return localStorage.getItem('anthropic_key') || ''; }

function openSettings() { document.getElementById('overlay').classList.add('show'); }
function closeSettings() { document.getElementById('overlay').classList.remove('show'); }

function saveSettings() {
  localStorage.setItem('tg_token', document.getElementById('tgToken').value);
  localStorage.setItem('tg_chatid', document.getElementById('tgChatId').value);
  localStorage.setItem('anthropic_key', prompt('请输入 Anthropic API Key (sk-ant-...):') || '');
  closeSettings();
}

function SP(t) { document.getElementById('prog').textContent = t; }
function setShareStatus(t, err) { document.getElementById('shareStatus').textContent = t; if(err) document.getElementById('shareStatus').style.color = '#cc4444'; }

function extractJSON(text) {
  let jsonStr = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  let braceCount = 0, startIdx = -1, endIdx = -1;
  
  for(let i = 0; i < jsonStr.length; i++) {
    if(jsonStr[i] === '{') {
      if(startIdx === -1) startIdx = i;
      braceCount++;
    } else if(jsonStr[i] === '}') {
      braceCount--;
      if(braceCount === 0 && startIdx !== -1) {
        endIdx = i;
        break;
      }
    }
  }
  
  if(startIdx !== -1 && endIdx !== -1) {
    jsonStr = jsonStr.substring(startIdx, endIdx + 1);
  }
  
  return JSON.parse(jsonStr);
}

async function fetchOne(url) {
  try {
    const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
    const res = await fetch(rssUrl);
    const json = await res.json();
    if(json.status === 'ok' && json.items && json.items.length > 0) {
      return json.items.slice(0, 8).map(item => ({
        src: url.split('/')[2],
        title: item.title,
        desc: (item.description || '').replace(/<[^>]*>/g, '').slice(0, 60)
      }));
    }
  } catch(e) { log('❌ 抓取失败: ' + url); }
  return [];
}

async function generate() {
  const btn = document.getElementById('btn');
  const empty = document.getElementById('empty');
  const container = document.getElementById('cardContainer');
  
  btn.disabled = true;
  empty.style.display = 'none';
  container.innerHTML = '';
  document.getElementById('err').style.display = 'none';
  SP('🔍 正在抓取新闻...');
  
  try {
    const now = new Date();
    const hour = now.getHours();
    const mode = (hour >= 5 && hour < 12) ? 'morning' : 'evening';
    
    document.getElementById('modeBadge').textContent = mode === 'morning' ? '🌅 早间版' : '🌙 晚间版';
    
    const feeds = [
      'https://moi.gov.ae/en/rss/news.aspx',
      'https://www.wam.ae/en/rss',
      'https://gulfnews.com/uae/rss'
    ];
    
    let raw = [];
    const promises = feeds.map(f => fetchOne(f));
    const settled = await Promise.allSettled(promises);
    settled.forEach(r => { if(r.status === 'fulfilled') raw = raw.concat(r.value); });
    log(`✅ 总共抓取 ${raw.length} 条新闻`);
    
    if(raw.length === 0) throw new Error('无法抓取任何新闻源，请检查网络连接');
    
    const newsBlock = raw.map((n, i) => `${i+1}. [${n.src}] ${n.title} (${n.desc})`).join('\n');
    const ds = (now.getMonth()+1) + '月' + now.getDate() + '日';
    
    let prompt;
    if(mode === 'morning') {
      prompt = `你是"迪拜今日报"主编。今天${ds}，2026年。

【实时抓取的新闻源】
${newsBlock}

【严格要求】
1. 只返回有效的 JSON，不要任何其他文本
2. 所有字符串必须正确转义
3. 必须基于上述抓取的新闻进行创作
4. 必须包含 date, mode, cards 三个顶级字段

【早间版】(05:00)：
- 卡片1：今日头条（5-6条硬核资讯）
- 卡片2：生活出行（天气|交通|福利用|分隔）+ 2-3条民生福利

【JSON 格式】
{
  "date": "${ds}",
  "mode": "morning",
  "cards": [
    {
      "title": "今日头条",
      "type": "news",
      "content": [
        {"emoji": "📰", "title": "新闻标题", "summary": "摘要"}
      ]
    }
  ]
}`;
    } else {
      prompt = `你是"迪拜今日报"主编。今天${ds}，2026年。

【实时抓取的新闻源】
${newsBlock}

【严格要求】
1. 只返回有效的 JSON，不要任何其他文本
2. 所有字符串必须正确转义
3. 必须基于上述抓取的新闻进行深度创作
4. 必须包含 date, mode, cards 三个顶级字段

【晚间版】(21:00)：深度锐评 + 行业拆解 + 保姆级实操

卡片1：今日锐评
- 基于抓取新闻的深度分析、洞察、风险提示（不少于150字）
- 行业拆解：房产/商业/教育内幕，基于事实

卡片2：保姆级实操
- 3个具体场景，包含App名称、点击路径、所需文件、预计时间、成本
- 例如：如何在开发商直租、如何注册DED执照、如何申请黄金签证

【JSON 格式】
{
  "date": "${ds}",
  "mode": "evening",
  "cards": [
    {
      "title": "今日锐评",
      "type": "insights",
      "insights": "深度分析文本（150字以上）",
      "industry": {
        "name": "房产/商业/教育",
        "analysis": "行业内幕分析"
      }
    },
    {
      "title": "保姆级实操",
      "type": "guides",
      "content": [
        {
          "title": "场景1：开发商直租",
          "steps": ["步骤1：...", "步骤2：..."]
        }
      ]
    }
  ]
}`;
    }
    
    SP('🤖 AI 正在深度创作...');
    log('📤 发送 Prompt 到 Claude API...');
    
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': K(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        messages: [{role: 'user', content: prompt}]
      })
    });
    
    log('📥 收到 API 响应...');
    const apiJson = await res.json();
    
    if(!apiJson.content || !apiJson.content[0]) {
      throw new Error('API 返回格式错误: ' + JSON.stringify(apiJson));
    }
    
    const rawText = apiJson.content[0].text;
    log('原始返回长度: ' + rawText.length);
    
    generatedData = extractJSON(rawText);
    log('✅ 数据解析成功，开始渲染...');
    renderCards(generatedData);
    document.getElementById('saveBtn').style.display = 'inline-flex';
    document.getElementById('tgBtn').style.display = 'inline-flex';
    
  } catch(e) {
    log('❌ 生成失败: ' + e.message);
    document.getElementById('err').textContent = '⚠️ ' + e.message;
    document.getElementById('err').style.display = 'block';
    empty.style.display = 'block';
  } finally {
    SP('');
    btn.disabled = false;
  }
}

function renderCards(data) {
  const container = document.getElementById('cardContainer');
  data.cards.forEach((card, idx) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'card';
    cardEl.id = 'card-' + idx;
    
    let contentHtml = '';
    if(card.type === 'news' && card.content && Array.isArray(card.content)) {
      contentHtml = `<div class="sec"><div class="slbl"><span class="scn">${card.title}</span><span class="sen">TOP HEADLINES</span><span class="sln"></span></div>`;
      card.content.forEach(item => {
        contentHtml += `<div class="ni"><div class="ne">${item.emoji||'📰'}</div><div class="nb"><div class="nt">${item.title}</div><div class="ns">${item.summary}</div></div></div>`;
      });
      contentHtml += `</div>`;
    } else if(card.type === 'insights') {
      contentHtml = `<div class="sec"><div class="slbl"><span class="scn">今日锐评</span><span class="sen">SHARP INSIGHTS</span><span class="sln"></span></div><div class="rw"><div class="rl">INSIGHT</div><div class="rt">${card.insights || card.text || ''}</div></div></div>`;
      if(card.industry) {
        contentHtml += `<div class="sec"><div class="slbl"><span class="scn">行业拆解</span><span class="sen">INDUSTRY</span><span class="sln"></span></div><div class="mi"><strong>${card.industry.name || ''}</strong>${card.industry.analysis || ''}</div></div>`;
      }
    } else if(card.type === 'guides' && card.content && Array.isArray(card.content)) {
      contentHtml = `<div class="sec"><div class="slbl"><span class="scn">保姆级实操</span><span class="sen">GUIDES</span><span class="sln"></span></div>`;
      card.content.forEach(g => {
        const steps = Array.isArray(g.steps) ? g.steps.join('<br>') : g.steps || '';
        contentHtml += `<div class="mi"><strong>${g.title}</strong>${steps}</div>`;
      });
      contentHtml += `</div>`;
    } else {
      contentHtml = `<div class="sec"><div class="mi">${card.text || JSON.stringify(card.content || {})}</div></div>`;
    }
    
    cardEl.innerHTML = `
      <div class="tbar"></div>
      <div class="chdr">
        <div class="hl"><div class="cn">迪拜今日报</div><div class="en">CARD ${idx+1} · ${data.mode.toUpperCase()}</div></div>
        <div class="hr"><div class="dt">${data.date}</div><div class="yr">2026 · DUBAI</div></div>
      </div>
      <div class="sbar"><div class="sdot"></div><span>官方聚合 · 深度创作 · 迪拜华人必读</span></div>
      ${contentHtml}
      <div class="cft"><div class="ft">© 2026 DUBAI DAILY DIGEST</div><div class="ft">PAGE ${idx+1}/${data.cards.length}</div></div>
      <div class="bbar"></div>
    `;
    container.appendChild(cardEl);
  });
}

async function saveAllImages() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setShareStatus('正在生成高清图片...');
  try {
    const cards = document.querySelectorAll('.card');
    for(let i = 0; i < cards.length; i++) {
      const canvas = await html2canvas(cards[i], {backgroundColor: '#08080d', scale: 2, useCORS: true});
      const link = document.createElement('a');
      link.download = `迪拜今日报_${generatedData.date}_P${i+1}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    setShareStatus('✅ 所有图片已保存');
  } catch(e) {
    setShareStatus('❌ 保存失败：' + e.message, true);
  } finally {
    btn.disabled = false;
  }
}

async function sendAllToTelegram() {
  const token = localStorage.getItem('tg_token');
  const chatId = localStorage.getItem('tg_chatid');
  if(!token || !chatId) { openSettings(); return; }
  
  const btn = document.getElementById('tgBtn');
  btn.disabled = true;
  setShareStatus('正在发送多图到 Telegram...');
  
  try {
    const cards = document.querySelectorAll('.card');
    for(let i = 0; i < cards.length; i++) {
      const canvas = await html2canvas(cards[i], {backgroundColor: '#08080d', scale: 2, useCORS: true});
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      const form = new FormData();
      form.append('chat_id', chatId);
      form.append('photo', blob, `p${i+1}.png`);
      if(i === 0) form.append('caption', `🏙️ 迪拜今日报 ${generatedData.date} ${generatedData.mode==='morning'?'🌅早间版':'🌙晚间版'}\n#迪拜 #阿联酋`);
      
      await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method: 'POST', body: form});
    }
    setShareStatus('✅ 已成功发送多图到 Telegram');
  } catch(e) {
    setShareStatus('❌ 发送失败：' + e.message, true);
  } finally {
    btn.disabled = false;
  }
}
</script>
